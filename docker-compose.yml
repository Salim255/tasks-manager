version: "3.9"
name: tasks-manager
services:
  tasks-manager-db:
    container_name: tasks-manager-db
    image: postgres:16
    restart: always

    env_file:
        - .env
        
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}

    volumes:
      - tasks-data:/var/lib/postgresql/data ## tasks-data => /var/lib/postgresql/data

    networks:
      - tasks-manager-network
    
  tasks-manager-client: 
    image: crawan/tasks-manager-client:latest

    ports:
      - "3004:80"

    restart: always

    networks:
      - tasks-manager-network
      
    env_file:
      - ./client/.env
  
  tasks-manager-server:
    depends_on:
      -  tasks-manager-db
    
    image: crawan/tasks-manager-server:latest

    ports:
      - "3005:3000"
    
    restart: always

    networks:
      - tasks-manager-network
      
    env_file:
      - ./servers/server/.env
  
volumes:
  tasks-data:

networks:
  tasks-manager-network:
    driver: bridge